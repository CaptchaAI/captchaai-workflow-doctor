# Gitleaks configuration.
#
# Inherit the upstream default ruleset and add an allowlist for the
# clearly-synthetic test fixtures we use in `tests/test_redaction.py`
# and `tests/test_captchaai_client.py`. These never represent a real
# credential and would otherwise trip `generic-api-key` due to the
# 32-char hex shape.
#
# IMPORTANT: only allowlist values that are obviously synthetic
# (low-entropy, repeating, or all-`x`/`f`/zeros). Never allowlist a
# value that could plausibly be a real key.

[extend]
useDefault = true

[allowlist]
description = "Synthetic test fixtures + historical (now-rotated) key"
regexes = [
  # Pure-repeat synthetic 32-char hex used in redaction tests.
  '''(?i)deadbeefdeadbeefdeadbeefdeadbeef''',
  '''(?i)deadbeefcafebabe1234567890abcdef''',
  # Synthetic 32-char hex used in mocked client tests (32 x same char).
  '''(?i)x{32}''',
  '''(?i)f{32}''',
  # Historical leak: this key was inadvertently committed in commit
  # 1468899d359decf9006aaba489fdf41af30d6ad7 and has been ROTATED
  # at the provider. Allowlisted so full-history scans pass.
  '''(?i)ad0926ac86e0c0157f839e0fe4850bbc''',
  # Public reCAPTCHA v3 test sitekey published by antcpt.com (used in
  # CaptchaAI / 2captcha integration guides for v3 score testing).
  # Sitekeys are PUBLIC by design — they ship in HTML — and this one
  # is universally documented; not a secret.
  '''6LcR_okUAAAAAPYrPe-HK_0RULO1aZM15ENyM-Mf''',
]
paths = [
  # Allowlist the test files anywhere they appear in history.
  '''tests/.*\.py$''',
  # The evidence doc records the public test-pair sitekey used for the
  # gated live-solve test; it is not a credential.
  '''docs/real-e2e-evidence\.md$''',
]
