name: local-demo-login-recaptcha
captcha_type: recaptcha_v2

target:
  url: "http://127.0.0.1:8766/login"
  allowed_domains:
    - "127.0.0.1"

browser:
  engine: chromium
  headless: true
  timeout_ms: 60000
  record_trace: true
  screenshots: true

captchaai:
  submit_endpoint: "https://ocr.captchaai.com/in.php"
  result_endpoint: "https://ocr.captchaai.com/res.php"
  polling_interval_seconds: 5
  max_wait_seconds: 120

detection:
  sitekey_selector: "div.g-recaptcha[data-sitekey]"
  response_field_selector: "textarea[name='g-recaptcha-response']"
  callback_candidates:
    - "onRecaptchaSuccess"
    - "recaptchaCallback"

actions:
  before_solve:
    - type: fill
      selector: "input[name='email']"
      value_env: "QA_EMAIL"
    - type: fill
      selector: "input[name='password']"
      value_env: "QA_PASSWORD"

  after_token:
    - type: inject_token
      selector: "textarea[name='g-recaptcha-response']"
    - type: invoke_callback_if_detected
    - type: wait
      milliseconds: 500
    - type: click
      selector: "button[type='submit']"

success:
  any_selector:
    - "[data-testid='dashboard']"
  url_contains:
    - "/dashboard"

failure:
  any_text:
    - "captcha verification failed"
    - "challenge failed"
